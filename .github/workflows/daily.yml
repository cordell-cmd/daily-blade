name: Generate Daily Stories


on:
  # Run every two hours; we gate generation in-job so it runs once the local
  # day reaches morning in America/New_York, then keeps retrying the same day
  # until today's issue exists.
  schedule:
    - cron: "5 */2 * * *"



  # Also allows you to run it manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      refresh_world_event_summaries:
        description: Regenerate world-event summaries (even if today's stories already exist)
        required: false
        default: false
        type: boolean
      refresh_chronicle:
        description: Regenerate the world chronicle now (bypasses the 16-day cadence)
        required: false
        default: false
        type: boolean


concurrency:
  group: daily-stories
  cancel-in-progress: false


jobs:
  generate:
    runs-on: ubuntu-latest


    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


    permissions:
      contents: write   # needed to commit stories back to the repo


    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke-check generator scripts
        run: |
          python -m py_compile generate_stories.py
          python -m py_compile audit_world_events.py
          python -m py_compile build_chronicle.py

      - name: Decide whether to generate
        id: gate
        env:
          FORCE_SUMMARY_REFRESH: ${{ github.event.inputs.refresh_world_event_summaries }}
          FORCE_CHRONICLE_REFRESH: ${{ github.event.inputs.refresh_chronicle }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          NUM_STORIES = 10
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          force_summary_refresh = str(os.environ.get("FORCE_SUMMARY_REFRESH", "") or "").strip().lower() in {"1", "true", "yes", "y"}
          force_chronicle_refresh = str(os.environ.get("FORCE_CHRONICLE_REFRESH", "") or "").strip().lower() in {"1", "true", "yes", "y"}
          now = datetime.now(ZoneInfo("America/New_York"))
          date_key = now.strftime("%Y-%m-%d")

          # Only generate on schedule after 06:00 ET.
          # Manual dispatch can generate anytime.
          allowed_by_time = (event_name == "workflow_dispatch") or (now.hour >= 6)

          archive_path = os.path.join("archive", f"{date_key}.json")
          already = False
          try:
            with open(archive_path, "r", encoding="utf-8") as f:
              data = json.load(f)
            stories = data.get("stories")
            already = isinstance(stories, list) and len(stories) >= NUM_STORIES and (data.get("date") == date_key)
          except Exception:
            already = False

          should_run = allowed_by_time and (not already)
          should_run_stories = should_run
          should_run_summaries = should_run or (event_name == "workflow_dispatch" and force_summary_refresh)
          should_run_chronicle = should_run or (event_name == "workflow_dispatch" and force_chronicle_refresh)
          print(f"Event={event_name} now_ET={now.isoformat()} date_key={date_key} allowed_by_time={allowed_by_time} already={already} should_run={should_run}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"date_key={date_key}\n")
            f.write(f"run_stories={'true' if should_run_stories else 'false'}\n")
            f.write(f"run_summaries={'true' if should_run_summaries else 'false'}\n")
            f.write(f"run_chronicle={'true' if should_run_chronicle else 'false'}\n")
          PY

      - name: Generate stories
        if: steps.gate.outputs.run_stories == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TIMEZONE: America/New_York
        run: python generate_stories.py

      - name: Generate world event arcs summary
        if: steps.gate.outputs.run_summaries == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_WORLD_EVENT_SUMMARIES: "1"
          WORLD_EVENT_SUMMARY_MAX_UPDATES: "50"
          WORLD_EVENT_SUMMARY_FORCE_REGEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_world_event_summaries && '1' || '0' }}
        run: python audit_world_events.py

      - name: Generate world chronicle
        if: steps.gate.outputs.run_chronicle == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHRONICLE_CADENCE_DAYS: "16"
          FORCE_CHRONICLE_REGEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_chronicle && '1' || '0' }}
        run: python build_chronicle.py


      - name: Commit and push stories
        if: steps.gate.outputs.run_stories == 'true' || steps.gate.outputs.run_summaries == 'true' || steps.gate.outputs.run_chronicle == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "Daily Blade Bot"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add stories.json archive/ lore.json characters.json codex.json world-events.json chronicle.json
          if [ -d chronicle-archive ]; then
            git add chronicle-archive/
          fi
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "🗡️ Daily stories — $(date -u '+%Y-%m-%d')"
          git push origin "HEAD:${GITHUB_REF_NAME}"

