name: Audit Entity

on:
  workflow_dispatch:
    inputs:
      entity_name:
        description: "Entity name (exact match from codex)"
        required: true
        type: string
      entity_type:
        description: "Entity type / codex category (e.g. characters, places, weapons)"
        required: true
        type: string

jobs:
  audit-entity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: audit-entity
      cancel-in-progress: false
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authorize actor
        env:
          AUDIT_ALLOWED_ACTORS: ${{ vars.AUDIT_ALLOWED_ACTORS }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Actor: $ACTOR"
          allowed_csv="$AUDIT_ALLOWED_ACTORS"
          if [ -z "$allowed_csv" ]; then
            allowed_csv="$REPO_OWNER"
          else
            allowed_csv="$allowed_csv,$REPO_OWNER"
          fi
          allowed_csv="$(echo "$allowed_csv" | tr '[:upper:]' '[:lower:]' | tr -d ' ')"
          actor_lc="$(echo "$ACTOR" | tr '[:upper:]' '[:lower:]')"
          IFS=',' read -r -a allowed <<< "$allowed_csv"
          ok=0
          for u in "${allowed[@]}"; do
            if [ -n "$u" ] && [ "$u" = "$actor_lc" ]; then
              ok=1
              break
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "Not authorized."
            exit 1
          fi

      - name: Audit entity completeness (Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python audit_entity.py --entity-name "${{ inputs.entity_name }}" --entity-type "${{ inputs.entity_type }}"

      - name: Commit and push result
        run: |
          if git diff --quiet && ! git ls-files --others --exclude-standard | grep -q .; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit-entity-result.json codex.json
          git commit -m "Audit entity: ${{ inputs.entity_name }} (${{ inputs.entity_type }})"
          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt..."
            git pull --rebase origin main && git push origin main && echo "✓ Pushed successfully" && exit 0
            echo "Attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "Failed to push after 5 attempts"
          exit 1
